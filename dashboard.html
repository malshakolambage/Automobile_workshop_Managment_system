<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AutoNex | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="checkFirstTimeUser()">

    <div id="sidebar">
        <div class="sidebar-header">AutoNex</div>
        <button class="nav-btn active" onclick="location.href='dashboard.html'">📊 Dashboard</button>
        <button class="nav-btn" onclick="location.href='customers.html'">👥 Customers</button>
        <button class="nav-btn" onclick="location.href='vehicles.html'">🚗 Vehicles</button>
        <button class="nav-btn" onclick="location.href='appointments.html'">📅 Appointments</button>
        <button class="nav-btn" onclick="location.href='billing.html'">💰 Billing</button>
        
        <div style="margin-top: auto; background: #2d3748;">
            <div class="profile-card">
                <div class="profile-img-container" style="width: 50px; height: 50px; border-color: #4a5568;">
                    <img id="sideProfilePic" src="https://via.placeholder.com/50" alt="Profile">
                </div>
                <p style="color: white; font-size: 13px; margin: 0;" id="sideWorkshopName">My Workshop</p>
                <button onclick="openProfileModal()" style="background: none; border: 1px solid #718096; color: #a0aec0; font-size: 10px; margin-top: 5px; cursor: pointer; border-radius: 4px;">Edit</button>
            </div>
            <div class="logout-section">
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <div id="main-content">
        <h1>Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card"><small>TOTAL CUSTOMERS</small><div id="statCustomers" style="font-size:24px; font-weight:bold">0</div></div>
            <div class="stat-card"><small>VEHICLES IN SHOP</small><div id="statVehicles" style="font-size:24px; font-weight:bold">0</div></div>
            <div class="stat-card"><small>TODAY'S REVENUE</small><div id="statRevenue" style="font-size:24px; font-weight:bold">RS. 0</div></div>
            <div class="stat-card"><small>PENDING TASKS</small><div id="statTasks" style="font-size:24px; font-weight:bold">0</div></div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px;">
            <div class="card">
                <h3>Today's Schedule</h3>
                <table id="scheduleTable">
                    <thead><tr><th>Time</th><th>Customer</th><th>Vehicle</th></tr></thead>
                    <tbody id="scheduleBody"></tbody>
                </table>
            </div>

            <div class="card">
                <h3>Recent Activities</h3>
                <div id="activityFeed"></div>
            </div>
        </div>
    </div>

    <div id="profileModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Workshop Profile</h3>
            
            <div class="profile-img-container">
                <img id="profilePreview" src="https://via.placeholder.com/100" alt="Preview">
            </div>
            
            <div style="text-align: center; margin-bottom: 15px;">
                <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="previewImage(event)">
                <label for="imageUpload" class="upload-btn">Change Photo</label>
                <button class="delete-btn" onclick="deletePhoto()">Remove Photo</button>
            </div>

            <label>Workshop Name</label>
            <input type="text" id="wsName" placeholder="Workshop Name">
            <label>Phone Number</label>
            <input type="text" id="wsPhone" placeholder="PhoneNumbr">
            <label>Email</label>
            <input type="email" id="wsEmail" placeholder="Email">
            <label>Location</label>
            <input type="text" id="wsLocation" placeholder="Location">

            <div style="display:flex; gap:10px; margin-top:20px">
                <button class="btn-blue" style="flex:1" onclick="saveProfile()">Save Changes</button>
                <button style="flex:1; background:#edf2f7; border:none; border-radius:6px; cursor:pointer;" onclick="closeProfileModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const defaultPic ="https://via.placeholder.com/100";

        function checkFirstTimeUser() {
            // Check for stats data
            if (!localStorage.getItem('garageDataExists')) {
                document.getElementById ('scheduleBody').innerHTML = '<tr> <td colspan="3" class="empty-state">No appointments</td></tr>';
                document.getElementById('activityFeed').innerHTML = '<p class="empty-state">No activity</p>';
            }
            loadProfile();
        }

        function openProfileModal() { document.getElementById('profileModal').style.display = 'flex'; }
        function closeProfileModal() { document.getElementById('profileModal').style.display = 'none'; }

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('profilePreview').src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function deletePhoto() {
            if(confirm("Remove profile photo?")) {
                document.getElementById('profilePreview').src = defaultPic;
            }
        }

        function saveProfile() {
            const profile = {
                name: document.getElementById('wsName').value,
                phone: document.getElementById('wsPhone').value,
                email: document.getElementById('wsEmail').value,
                location: document.getElementById('wsLocation').value,
                image: document.getElementById('profilePreview').src
            };
            localStorage.setItem('workshopProfile', JSON.stringify(profile));
            loadProfile();
            closeProfileModal();
        }

        function loadProfile() {
            const saved = JSON.parse(localStorage.getItem('workshopProfile'));
            if (saved) {
                document.getElementById('sideWorkshopName').innerText = saved.name || "My Workshop";
                document.getElementById('sideProfilePic').src = saved.image || defaultPic;
                
                document.getElementById('wsName');
                document.getElementById('wsPhone');
                document.getElementById('wsEmail');
                document.getElementById('wsLocation');
                document.getElementById('profilePreview');
            }
        }

        function logout() {
            if(confirm("Are you sure you want to logout?")) {
                
                localStorage.removeItem('userLoggedIn'); 
                
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
