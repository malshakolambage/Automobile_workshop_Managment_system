<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AutoNex | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #1a202c; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div class="card login-card" style="width: 380px; text-align: center; padding: 40px;">
        <h1 style="color:#3182ce; margin-bottom: 5px;">AutoNex</h1>
        <p style="color: #718096; margin-bottom: 30px;">Sign in to your account</p>
        
        <input type="text" placeholder="Username" style="width: 100%;">
        <input type="password" placeholder="Password" style="width: 100%;">
        
        <button class="btn-blue" style="width:100%; border-radius: 25px; padding: 12px;" onclick="location.href='dashboard.html'">Login</button>
        
        <span class="toggle-link" onclick="openSignup()">Don't have an account? <b>Sign up</b></span>
    </div>

    <div id="signupModal" class="modal-overlay">
        <div class="modal-content" style="border-radius: 20px; text-align: center;">
            <h2 style="margin-bottom: 10px;">Create an account</h2>
            <p style="color: #718096; font-size: 14px; margin-bottom: 25px;">Sign up with AutoNex</p>
            
            <div style="text-align: left;">
                <label>Full Name</label>
                <input type="text" id="newName" placeholder="Saman Perera" style="border-radius: 25px;">
                
                <label>Email</label>
                <input type="email" id="newEmail" placeholder="samanp@gmail.com" style="border-radius: 25px;">
                
                <label>Mobile Number</label>
                <input type="text" id="newMobile" placeholder="07XXXXXXXX" style="border-radius: 25px;">
                
                <label>Password</label>
                <input type="password" id="newPass" placeholder="••••••••" style="border-radius: 25px;">
            </div>

            <button class="btn-blue" style="width:100%; border-radius: 25px; margin-top: 20px; background: #ecc94b; color: #000;" onclick="handleSignup()">Submit</button>
            <span class="toggle-link" onclick="closeSignup()">Already have an account? <b>Login</b></span>
        </div>
    </div>

    <script>
        function openSignup() {
            document.getElementById ('signupModal').style.display = 'flex';
        }
        function closeSignup() {
            document.getElementById('signupModal').style.display = 'none';
        }

        function handleSignup() {
            const name = document.getElementById('newName').value;
            const email = document.getElementById('newEmail').value;
            const mobile = document.getElementById('newMobile').value;

            if(!name || !email || !mobile) {
                alert("Please fill details to create your account.");
                return;
            }

            alert("Account created successfully for " + name);
            closeSignup();
        }
    </script>
</body>
</html>
